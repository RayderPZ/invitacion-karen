<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Karen</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
font-family:'Montserrat',sans-serif;
overflow:hidden;
color:white;
}

/* PORTADA */

#portada{
position:fixed;
width:100%;
height:100vh;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.8)),
url('https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=1200');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
overflow:hidden;
}

.brillos{
position:absolute;
width:100%;
height:100%;
background:url('https://i.imgur.com/8IuucQZ.png');
opacity:.4;
animation:brillo 8s linear infinite;
}

@keyframes brillo{
0%{transform:translateY(0);}
100%{transform:translateY(-100px);}
}

.card{
position:relative;
width:90%;
max-width:420px;
height:88vh;
border:3px solid gold;
border-radius:30px;
padding:25px;
background:rgba(0,0,0,.65);
backdrop-filter:blur(8px);
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
box-shadow:0 0 40px rgba(255,215,0,.3);
overflow:hidden;
}

.cadenas{
position:absolute;
inset:0;
border-radius:30px;
border:2px solid rgba(255,215,0,.4);
pointer-events:none;
}

.rosas{
position:absolute;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:10px;
font-size:45px;
}

.nombre{
margin-top:40px;
text-align:center;
}

.nombre h1{
font-family:'Cinzel',serif;
font-size:58px;
color:gold;
text-shadow:0 0 15px gold;
letter-spacing:4px;
animation:zoom 2s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.04);}
}

.nombre p{
margin-top:10px;
font-size:18px;
letter-spacing:3px;
}

.logo{
text-align:center;
font-size:35px;
font-weight:bold;
color:white;
line-height:1.2;
text-shadow:0 0 10px rgba(255,255,255,.4);
}

.logo span{
color:gold;
}

.tacon{
font-size:120px;
cursor:pointer;
transition:.4s;
animation:flotar 2s infinite alternate;
}

@keyframes flotar{
from{transform:translateY(0);}
to{transform:translateY(-15px);}
}

.tacon:hover{
transform:scale(1.1);
}

.toca{
font-size:20px;
margin-top:-20px;
color:gold;
text-align:center;
}

.armas{
width:100%;
display:flex;
justify-content:space-between;
font-size:60px;
}

/* INFORMACION */

#info{
position:fixed;
top:0;
left:100%;
width:100%;
height:100vh;
background:
linear-gradient(rgba(0,0,0,.88),rgba(0,0,0,.92)),
url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=1200');
background-size:cover;
background-position:center;
transition:1s;
display:flex;
justify-content:center;
align-items:center;
overflow-y:auto;
padding:20px;
}

#info.active{
left:0;
}

.info-card{
width:100%;
max-width:420px;
border:2px solid gold;
border-radius:30px;
padding:30px;
background:rgba(0,0,0,.75);
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,215,0,.3);
text-align:center;
}

.info-card h2{
font-family:'Cinzel',serif;
font-size:55px;
color:gold;
margin-bottom:30px;
text-shadow:0 0 10px gold;
}

.detalle{
margin:25px 0;
font-size:22px;
line-height:1.8;
}

.detalle strong{
color:gold;
}

.btn{
display:inline-block;
margin-top:20px;
padding:16px 35px;
border-radius:50px;
background:gold;
color:black;
text-decoration:none;
font-weight:bold;
font-size:20px;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.frase{
margin-top:35px;
font-size:18px;
line-height:1.8;
color:#ddd;
border-top:1px solid rgba(255,255,255,.2);
padding-top:25px;
}

#contador{
font-size:35px;
font-weight:bold;
color:gold;
margin-top:20px;
text-shadow:0 0 10px gold;
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="musica" autoplay loop>
<source src="https://files.catbox.moe/8l6m0v.mp3" type="audio/mpeg">
</audio>

<!-- PORTADA -->
<section id="portada">

<div class="brillos"></div>

<div class="card">

<div class="cadenas"></div>

<div class="rosas">
<div>🌹</div>
<div>🌹</div>
</div>

<div class="nombre">
<p>INVITACIÓN DE</p>
<h1>KAREN</h1>
</div>

<div class="logo">
LAS <span>MUÑECAS</span><br>
DE LA MAFIA
</div>

<div class="tacon" onclick="abrirInvitacion()">
👠
</div>

<div class="toca">
TOCA EL TACÓN<br>
PARA VER MÁS
</div>

<div class="armas">
<div>💵🔫</div>
<div>🔫💵</div>
</div>

</div>

</section>

<!-- INFORMACION -->
<section id="info">

<div class="info-card">

<h2>KAREN</h2>

<div class="detalle">
📅 <strong>16 DE MAYO</strong>
</div>

<div class="detalle">
🕑 <strong>2:00 PM</strong>
</div>

<div class="detalle">
🎵 <strong>LAS MUÑECAS DE LA MAFIA</strong><br>
DAME TU AMOR
</div>

<div id="contador"></div>

<a class="btn" href="https://maps.app.goo.gl/iue5b4aGKH1k3PYM7" target="_blank">
📍 VER UBICACIÓN
</a>

<div class="frase">
“No somos princesas,<br>
somos reinas de nuestro propio imperio.”
</div>

</div>

</section>

<script>

function abrirInvitacion(){

document.getElementById("info").classList.add("active");

const audio = document.getElementById("musica");

audio.play();

}

/* cuenta regresiva */

const fechaEvento = new Date("May 16, 2026 14:00:00").getTime();

const contador = setInterval(() => {

const ahora = new Date().getTime();

const diferencia = fechaEvento - ahora;

const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));

const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));

const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

document.getElementById("contador").innerHTML =
`⏳ ${dias}d ${horas}h ${minutos}m ${segundos}s`;

if (diferencia < 0) {

clearInterval(contador);

document.getElementById("contador").innerHTML =
"🎉 ¡LA FIESTA COMENZÓ!";

}

},1000);

</script>

</body>
</html>
